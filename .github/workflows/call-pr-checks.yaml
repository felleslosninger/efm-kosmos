name: Run maven build and test (unit & integration) and trivy fs scan

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
    branches: [main]

permissions:
  pull-requests: write
  contents: write
  issues: write
  repository-projects: read

jobs:

  # TODO - ci-pr-checks.yml gjorde sjekk av PR navnet, ny versjon av ci-maven-build.yml vil gjøre trivy fs scan
  call-workflow-maven-build:
    uses: felleslosninger/github-workflows/.github/workflows/ci-maven-build.yml@main
    with:
      java-version: 21
      maven-lifecycle: verify
    secrets: inherit
