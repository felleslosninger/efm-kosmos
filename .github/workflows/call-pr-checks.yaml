name: Call CI pr checks

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
    branches: [main]

jobs:
  call-workflow-maven-build:
    uses: felleslosninger/github-workflows/.github/workflows/ci-pr-checks.yml@main
    with:
      application-type: spring-boot
      maven-lifecycle: verify
    secrets: inherit
