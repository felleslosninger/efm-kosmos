name: Call CI pr checks

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  repository-projects: read

jobs:
  run-pr-checks:
    uses: felleslosninger/github-workflows/.github/workflows/ci-pr-checks.yml@main
    with:
      pull-request-title: ${{ github.event.pull_request.title }}
      pull-request-allowed-prefixes: "Bump,MOVE-"
      application-type: spring-boot
      java-version: 21
      maven-lifecycle: verify
    secrets: inherit
